<!DOCTYPE html>
<html>
<head>
    <title>Positive or Negative</title>
</head>
<body>

<h2>Check Number</h2>

<script>
    let num = prompt("Enter a number:");

    if (num > 0) {
        document.write("The number is Positive");
    } else if (num < 0) {
        document.write("The number is Negative");
    } else {
        document.write("The number is Zero");
    }
</script>

</body>
</html>
